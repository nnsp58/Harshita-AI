<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration - Ravan CSC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>Candidate Registration</h4>
                        <p>Fill your details for job applications</p>
                    </div>
                    <div class="card-body">
                        <form id="candidateForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Full Name *</label>
                                        <input type="text" class="form-control" id="name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Father's Name *</label>
                                        <input type="text" class="form-control" id="fatherName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Date of Birth *</label>
                                        <input type="date" class="form-control" id="dob" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Gender *</label>
                                        <select class="form-control" id="gender" required>
                                            <option value="">Select</option>
                                            <option value="male">Male</option>
                                            <option value="female">Female</option>
                                            <option value="other">Other</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Aadhaar Number *</label>
                                        <input type="text" class="form-control" id="aadhaar" pattern="[0-9]{12}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Mobile Number *</label>
                                        <input type="tel" class="form-control" id="mobile" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Village *</label>
                                        <input type="text" class="form-control" id="village" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">Tehsil *</label>
                                        <input type="text" class="form-control" id="tehsil" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">District *</label>
                                        <input type="text" class="form-control" id="district" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label class="form-label">State *</label>
                                        <input type="text" class="form-control" id="state" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Pincode *</label>
                                        <input type="text" class="form-control" id="pincode" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-control" id="category">
                                    <option value="">Select</option>
                                    <option value="general">General</option>
                                    <option value="obc">OBC</option>
                                    <option value="sc">SC</option>
                                    <option value="st">ST</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Upload Documents (Aadhaar, Marksheet, etc.)</label>
                                <input type="file" class="form-control" id="documents" multiple accept="image/*,application/pdf">
                                <small class="text-muted">Note: Images are processed using OCR (text extraction). Direct image AI processing not supported.</small>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Registration</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cscId = urlParams.get('csc');

        if (!cscId) {
            alert('Invalid link');
            window.location.href = 'index.html';
        }

        document.getElementById('candidateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('cscId', cscId);
            formData.append('name', document.getElementById('name').value);
            formData.append('fatherName', document.getElementById('fatherName').value);
            formData.append('dob', document.getElementById('dob').value);
            formData.append('gender', document.getElementById('gender').value);
            formData.append('aadhaar', document.getElementById('aadhaar').value);
            formData.append('mobile', document.getElementById('mobile').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('village', document.getElementById('village').value);
            formData.append('tehsil', document.getElementById('tehsil').value);
            formData.append('district', document.getElementById('district').value);
            formData.append('state', document.getElementById('state').value);
            formData.append('pincode', document.getElementById('pincode').value);
            formData.append('category', document.getElementById('category').value);

            const files = document.getElementById('documents').files;
            for (let i = 0; i < files.length; i++) {
                formData.append('documents', files[i]);
            }

            try {
                const response = await fetch('http://localhost:3001/api/candidates/public', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    alert('Registration successful! CSC will contact you for job applications.');
                    window.location.href = 'https://wa.me/919876543210?text=Hi, I have registered for job applications.';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Registration failed. Please try again.');
            }
        });
    </script>
</body>
</html>

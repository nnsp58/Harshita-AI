<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravan CSC SaaS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-container { max-width: 400px; margin: 5% auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4">Ravan CSC SaaS</h2>
            <div id="login-form">
                <h4>Login</h4>
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 text-center"><a href="#" id="showSignup">New CSC Center? Sign Up</a></p>
            </div>
            <div id="signup-form" style="display: none;">
                <h4>Sign Up CSC Center</h4>
                <form id="signupForm">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="cscName" placeholder="CSC Center Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="address" placeholder="Address" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" id="contactEmail" placeholder="Contact Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="tel" class="form-control" id="contactPhone" placeholder="Contact Phone" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="vleId" placeholder="VLE ID (Optional)">
                    </div>
                    <div class="mb-3">
                        <select class="form-control" id="plan" required>
                            <option value="free">Free Trial (7 days)</option>
                            <option value="basic">Basic - ₹299/month</option>
                            <option value="standard">Standard - ₹699/month</option>
                            <option value="pro">Pro - ₹1299/month</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Sign Up</button>
                </form>
                <p class="mt-3 text-center"><a href="#" id="showLogin">Already have account? Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:3001/api';

        // Toggle forms
        document.getElementById('showSignup').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Login failed');
            }
        });

        // Signup form
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('cscName').value,
                address: document.getElementById('address').value,
                contactEmail: document.getElementById('contactEmail').value,
                contactPhone: document.getElementById('contactPhone').value,
                vleId: document.getElementById('vleId').value,
                plan: document.getElementById('plan').value
            };

            try {
                const response = await fetch(`${API_BASE}/csc/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                if (data.success) {
                    alert('Signup successful! Please login.');
                    document.getElementById('signup-form').style.display = 'none';
                    document.getElementById('login-form').style.display = 'block';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Signup failed');
            }
        });
    </script>
</body>
</html>
